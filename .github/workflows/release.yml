name: Release

on:
  push:
    tags:
      - 'v*'   # e.g. v0.1.0, v1.2.3

jobs:
  build-and-release:
    name: Build, Package & Release
    runs-on: windows-latest

    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Strip the leading 'v' from the tag (v0.1.0 → 0.1.0)
      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test -c Release --no-restore -- RunConfiguration.TargetPlatform=x64

      - name: Publish
        run: >
          dotnet publish src/VoxInject/VoxInject.csproj
          -c Release
          -r win-x64
          --no-self-contained
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.value }}

      # Inno Setup 6 is pre-installed on windows-latest
      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" `
            /DMyAppVersion=${{ steps.version.outputs.value }} `
            installer\VoxInject.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoxInject ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: installer/output/VoxInject-setup.exe
